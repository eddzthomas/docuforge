<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuForge — Document Processing Pipeline</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<!-- ================================================================
     DocuForge — Single-Page Web UI
     Three tabs: Upload, History, Settings
     ================================================================ -->
<div class="app-container">

    <!-- ---- Header ---- -->
    <header>
        <h1>DocuForge</h1>
        <p>Upload scanned PDFs &amp; images — get searchable PDF/A with OCR</p>
    </header>

    <!-- ---- Tab Navigation ---- -->
    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="upload">Upload</button>
        <button class="tab-btn" data-tab="history">History</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>

    <!-- ============================================================
         TAB 1: Upload
         Drag-and-drop zone + file list + process button
         ============================================================ -->
    <div class="tab-panel active" id="panel-upload">
        <!-- Upload zone: click or drag files -->
        <div class="upload-zone" id="upload-zone">
            <span class="upload-zone-icon">&#128196;</span>
            <h3>Drop files here or click to browse</h3>
            <p>PDF, PNG, JPG, TIFF, BMP — up to 100 MB each</p>
            <input type="file" id="file-input" multiple accept=".pdf,.png,.jpg,.jpeg,.tiff,.tif,.bmp">
        </div>

        <!-- List of files queued for upload -->
        <div class="file-list" id="file-list"></div>

        <!-- Process button (hidden until files are added) -->
        <button class="btn btn-primary process-btn" id="process-btn" style="display: none;">
            Process Files
        </button>

        <!-- Status bar shows Ollama connectivity -->
        <div class="status-bar" id="status-bar">
            <span class="status-dot offline" id="status-dot"></span>
            <span id="status-text">Checking Ollama connection...</span>
        </div>
    </div>

    <!-- ============================================================
         TAB 2: History
         Job history table with statuses, tags, and download links
         ============================================================ -->
    <div class="tab-panel" id="panel-history">
        <!-- Tag filter bar (functional in Sprint 2) -->
        <div class="tag-filter" id="tag-filter" style="display: none; margin-bottom: 16px;">
            <input type="text" class="tag-search" placeholder="Filter by tag..." style="width: 100%;" disabled>
        </div>

        <!-- Job table -->
        <table class="job-table" id="job-table">
            <thead>
                <tr>
                    <th>File</th>
                    <th>Status</th>
                    <th>Tags</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="job-tbody">
                <!-- Rows populated by JavaScript -->
            </tbody>
        </table>

        <!-- Empty state shown when no jobs exist -->
        <div class="empty-state" id="history-empty">
            <span class="icon">&#128203;</span>
            <p>No files processed yet. Upload something to get started.</p>
        </div>
    </div>

    <!-- ============================================================
         TAB 3: Settings
         Configuration form (functional in Sprint 4)
         ============================================================ -->
    <div class="tab-panel" id="panel-settings">
        <form class="settings-form" id="settings-form" onsubmit="return false;">
            <div class="form-group">
                <label for="cfg-ollama-host">Ollama Host</label>
                <input type="text" id="cfg-ollama-host" value="http://ollama:11434" disabled>
            </div>
            <div class="form-group">
                <label for="cfg-ocr-model">OCR Model</label>
                <input type="text" id="cfg-ocr-model" value="glm-ocr" disabled>
            </div>
            <div class="form-group">
                <label for="cfg-tagging-model">Tagging Model</label>
                <input type="text" id="cfg-tagging-model" value="llama3.2" disabled>
            </div>
            <div class="form-group">
                <label for="cfg-dpi">Render DPI</label>
                <input type="number" id="cfg-dpi" value="300" min="72" max="600" disabled>
            </div>
            <div class="form-group">
                <label for="cfg-pdfa-level">PDF/A Level</label>
                <select id="cfg-pdfa-level" disabled>
                    <option value="2b">PDF/A-2b</option>
                    <option value="3b">PDF/A-3b</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cfg-auto-rename">Auto-rename</label>
                <select id="cfg-auto-rename" disabled>
                    <option value="false">Off (manual approval)</option>
                    <option value="true">On (auto-apply)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cfg-rename-prompt">Rename Prompt Template</label>
                <textarea id="cfg-rename-prompt" rows="6" disabled>
You are a document archivist. Given the following OCR'd text, suggest:
1. A concise filename (max 150 chars). Use underscores.
2. Up to 5 tags for type, parties, subject, year.

Return JSON: {"filename": "...", "tags": [...]}

Document text:
{ocr_text}
                </textarea>
            </div>
            <button type="submit" class="btn btn-primary" disabled>
                Save Settings (coming in Sprint 4)
            </button>
        </form>
    </div>

    <!-- ---- Modal container (Sprint 2 — Preview & Approve) ---- -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content">
            <!-- Filled by JS -->
        </div>
    </div>

</div>

<!-- ================================================================
     JavaScript
     Tab switching, upload handling, job polling, status checks
     ================================================================ -->
<script>
// ================================================================
// DocuForge — Frontend JavaScript
// Tab switching, file upload, job polling, history rendering
// ================================================================

// ---- Tab Switching ----
function switchTab(tabName) {
    // Deactivate all tabs and panels
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

    // Activate the target tab and its panel
    const btn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
    if (btn) btn.classList.add('active');
    const panel = document.getElementById('panel-' + tabName);
    if (panel) panel.classList.add('active');
}

// Listen for clicks on tab buttons
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ---- File Upload Handling ----
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const processBtn = document.getElementById('process-btn');

// Holds the File objects selected by the user
let pendingFiles = [];

// Click on upload zone triggers file input
uploadZone.addEventListener('click', () => fileInput.click());

// Prevent default drag behaviors to allow drop
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    uploadZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); });
});

// Highlight the drop zone when files are dragged over it
['dragenter', 'dragover'].forEach(eventName => {
    uploadZone.addEventListener(eventName, () => uploadZone.classList.add('drag-over'));
});
['dragleave', 'drop'].forEach(eventName => {
    uploadZone.addEventListener(eventName, () => uploadZone.classList.remove('drag-over'));
});

// Handle file drop
uploadZone.addEventListener('drop', e => {
    addFiles(Array.from(e.dataTransfer.files));
});

// Handle file selection via browse dialog
fileInput.addEventListener('change', () => {
    addFiles(Array.from(fileInput.files));
    fileInput.value = ''; // Reset so re-selecting the same file works
});

// Add files to the pending list and render the UI
function addFiles(newFiles) {
    newFiles.forEach(file => {
        // Avoid duplicates by filename + size
        if (!pendingFiles.some(f => f.name === file.name && f.size === file.size)) {
            pendingFiles.push(file);
        }
    });
    renderFileList();
}

// Render the file list with remove buttons
function renderFileList() {
    fileList.innerHTML = '';
    pendingFiles.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
            <span class="name">${escapeHtml(file.name)}</span>
            <span class="size">${formatSize(file.size)}</span>
            <button class="remove-btn" data-index="${index}" title="Remove">&times;</button>
        `;
        fileList.appendChild(item);
    });

    // Show/hide process button
    processBtn.style.display = pendingFiles.length > 0 ? 'inline-flex' : 'none';

    // Wire up remove buttons
    fileList.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const idx = parseInt(btn.dataset.index);
            pendingFiles.splice(idx, 1);
            renderFileList();
        });
    });
}

// ---- Process Button — Uploads all queued files to the API ----
processBtn.addEventListener('click', async () => {
    if (pendingFiles.length === 0) return;

    // Disable button to prevent double-clicks
    processBtn.disabled = true;
    processBtn.textContent = 'Uploading...';

    // Upload each file individually to POST /api/upload
    let uploadedCount = 0;
    let errorCount = 0;

    for (const file of pendingFiles) {
        const formData = new FormData();
        formData.append('files', file);

        try {
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            if (!res.ok) {
                const err = await res.json();
                console.error('Upload failed:', err.detail || res.statusText);
                errorCount++;
                continue;
            }
            uploadedCount++;
        } catch (err) {
            console.error('Upload error:', err);
            errorCount++;
        }
    }

    // Clear the file queue and reset the UI
    pendingFiles = [];
    renderFileList();
    processBtn.disabled = false;
    processBtn.textContent = 'Process Files';

    // Show toast notification with upload results
    if (uploadedCount > 0) {
        showToast(`${uploadedCount} file(s) uploaded successfully`, 'success');
        switchTab('history');
        refreshJobs();
    }
    if (errorCount > 0) {
        showToast(`${errorCount} file(s) failed to upload`, 'error');
    }
});

// ---- Job Polling — Fetches job list every 2 seconds ----
let pollInterval = null;

async function refreshJobs() {
    try {
        const res = await fetch('/api/jobs');
        if (!res.ok) return;
        const jobs = await res.json();
        renderJobHistory(jobs);
    } catch (err) {
        console.error('Job poll error:', err);
    }
}

// Start polling when the page loads
pollInterval = setInterval(refreshJobs, 2000);
// Also run immediately
refreshJobs();

// ---- Render Job History Table ----
function renderJobHistory(jobs) {
    const tbody = document.getElementById('job-tbody');
    const emptyState = document.getElementById('history-empty');
    const table = document.getElementById('job-table');

    if (!jobs || jobs.length === 0) {
        table.style.display = 'none';
        emptyState.style.display = 'block';
        return;
    }

    table.style.display = '';
    emptyState.style.display = 'none';

    // Update processing pulse indicator on the History tab button
    updateProcessingIndicator(jobs);

    tbody.innerHTML = jobs.map(job => {
        // Build status badge
        const statusClass = 'status-' + job.status;
        const statusLabel = job.status.charAt(0).toUpperCase() + job.status.slice(1);

        // Build page progress text
        let pageInfo = '';
        if (job.pages > 0) {
            pageInfo = ` (${job.pages_done}/${job.pages})`;
        }

        // Build tags display (functional in Sprint 2)
        let tagsHtml = '';
        if (job.tags && job.tags.length > 0) {
            tagsHtml = job.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
        } else {
            tagsHtml = '<span style="color: var(--text-muted)">—</span>';
        }

        // Build actions column — download button only when done
        let actionsHtml = '';
        if (job.status === 'done' && job.output_filename) {
            actionsHtml = `<a href="/api/download/${job.id}" class="btn btn-sm btn-primary" download>Download</a>`;
        } else if (job.status === 'failed') {
            actionsHtml = `<span class="btn btn-sm" style="cursor:default;opacity:0.5" title="${escapeHtml(job.error || '')}">Failed</span>`;
        } else {
            actionsHtml = '<span style="color: var(--text-muted);font-size:0.8rem">—</span>';
        }

        // Build tier summary tooltip
        let tierInfo = '';
        if (job.tier_summary && Object.keys(job.tier_summary).length > 0) {
            const parts = [];
            if (job.tier_summary.word) parts.push(`${job.tier_summary.word} word-level`);
            if (job.tier_summary.line) parts.push(`${job.tier_summary.line} line-level`);
            if (job.tier_summary.skip) parts.push(`${job.tier_summary.skip} skipped`);
            tierInfo = `title="OCR tiers: ${parts.join(', ')}"`;
        }

        // Format date relative
        const created = new Date(job.created_at);
        const timeStr = formatRelativeTime(created);

        return `
            <tr ${tierInfo}>
                <td><strong>${escapeHtml(job.original_name)}</strong></td>
                <td>
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                    <span style="font-size:0.75rem;color:var(--text-muted);margin-left:6px">${pageInfo}</span>
                </td>
                <td>${tagsHtml}</td>
                <td style="font-size:0.8rem;color:var(--text-secondary)">${timeStr}</td>
                <td>${actionsHtml}</td>
            </tr>
        `;
    }).join('');
}

// ---- Utility Functions ----

// Sanitize user-provided text for safe HTML insertion
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Format bytes into human-readable size
function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
}

// Format a Date as relative time string (e.g., "2 min ago")
function formatRelativeTime(date) {
    const now = new Date();
    const diffSec = Math.floor((now - date) / 1000);

    if (diffSec < 5) return 'just now';
    if (diffSec < 60) return `${diffSec}s ago`;
    if (diffSec < 3600) return `${Math.floor(diffSec / 60)}m ago`;
    if (diffSec < 86400) return `${Math.floor(diffSec / 3600)}h ago`;
    // Older — show date
    return date.toLocaleDateString();
}

// ---- Toast Notification ----
// Shows a brief popup at the bottom-right, auto-dismisses after 3 seconds
function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    // Remove from DOM after the fade-out animation completes
    setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 3000);
}

// ---- Processing Indicator ----
// Check if any jobs are in 'processing' state and show a pulse on the History tab
function updateProcessingIndicator(jobs) {
    const historyBtn = document.querySelector('.tab-btn[data-tab="history"]');
    if (!historyBtn) return;

    const hasProcessing = jobs.some(j => j.status === 'processing');
    const hasQueued = jobs.some(j => j.status === 'queued');

    if (hasProcessing || hasQueued) {
        historyBtn.classList.add('processing');
    } else {
        historyBtn.classList.remove('processing');
    }
}

// ---- Health Check Polling ----
// Poll the health endpoint every 10 seconds to show Ollama connectivity
async function checkHealth() {
    try {
        const res = await fetch('/api/health');
        const data = await res.json();
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        if (data.ollama === 'connected') {
            dot.className = 'status-dot online';
            text.textContent = 'Ollama connected';
        } else {
            dot.className = 'status-dot offline';
            text.textContent = 'Ollama disconnected — OCR unavailable';
        }
    } catch (err) {
        const dot = document.getElementById('status-dot');
        dot.className = 'status-dot offline';
        document.getElementById('status-text').textContent = 'App error — check logs';
    }
}

// Check immediately, then every 10 seconds
checkHealth();
setInterval(checkHealth, 10000);
</script>
</body>
</html>
