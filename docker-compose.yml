# DocuForge — Docker Compose
# ============================================================
# Start everything: docker compose up --build
#
# Services:
#   docuforge  —  FastAPI web app on port 8080
#   ollama     —  Local LLM runtime for GLM-OCR and tagging models
#
# GPU users:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build

services:
  # ---- Web application ----
  docuforge:
    build: .
    container_name: docuforge-app
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - UPLOAD_FOLDER=/data/uploads
      - OUTPUT_FOLDER=/data/output
      - CONFIG_PATH=/data/settings.json
      - OLLAMA_AUTO_PULL=true
      - OLLAMA_AUTO_PULL_MODELS=glm-ocr,llama3.2
    volumes:
      # Mount the entire data directory — uploads, output, and UI-saved settings
      # all persist on the host at ./data/
      - ./data:/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - docuforge-net

  # ---- Ollama LLM runtime ----
  ollama:
    image: ollama/ollama:latest
    container_name: docuforge-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist downloaded models across restarts
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=10m
    restart: unless-stopped
    networks:
      - docuforge-net
    # CPU-only by default. Override with docker-compose.gpu.yml for NVIDIA GPUs.
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  ollama-data:
    driver: local

networks:
  docuforge-net:
    driver: bridge
